<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crow Miller Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"DM Sans",sans-serif;background:#fffdf8;color:#2a1f0a;min-height:100vh}

/* HERO */
.hero{background:linear-gradient(160deg,#f9f0e8 0%,#fdf5e8 50%,#fef8f0 100%);padding:0 0 0 0;text-align:center;position:relative;overflow:hidden}

/* FLORAL SVG top */
.floral-top{width:100%;display:block}
.hero-content{padding:8px 24px 32px;position:relative;z-index:2}
.hero-eyebrow{font-size:10px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:#c8a84e;margin-bottom:12px}
.hero-title{font-family:"Cormorant Garamond",serif;font-size:52px;font-weight:300;color:#2a1f0a;line-height:1;margin-bottom:8px}
.hero-title em{font-style:italic;color:#c8a84e}
.hero-sub{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:16px;color:rgba(42,31,10,0.5);margin-top:4px}
.countdowns{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}
.countdown-block{flex:1;background:rgba(255,255,255,0.6);border:1px solid rgba(200,168,78,0.3);border-radius:12px;padding:12px 10px;text-align:center}
.countdown-num{font-family:"Cormorant Garamond",serif;font-size:38px;font-weight:300;color:#2a1f0a;line-height:1}
.countdown-unit{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#c8a84e;margin-top:2px}
.countdown-label{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:#8a7a5a;margin-bottom:6px}

/* STATS */
.stats-grid{background:#f5ede0;border-top:1px solid #e8d8c0;border-bottom:1px solid #e8d8c0}
.stats-header{display:grid;grid-template-columns:90px 1fr 1fr 1fr;background:linear-gradient(135deg,#e8c87a,#d4a84e)}
.stats-header-cell{padding:7px 4px;text-align:center;font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#2a1f0a}
.stats-row{display:grid;grid-template-columns:90px 1fr 1fr 1fr;background:#fffdf8;border-bottom:1px solid #f0e4cc}
.stats-row:last-child{border-bottom:none}
.stats-row-label{padding:10px 10px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:#8a7a5a;display:flex;align-items:center}
.stats-cell{padding:10px 4px;text-align:center}
.stats-num{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:300;line-height:1}
.n-invited{color:#5a8a5c}
.n-attending{color:#c87860}
.n-pending{color:#7a8ac8}

/* TABS */
.tabs{display:flex;background:#fdf8f0;border-bottom:2px solid #e8d8c0}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#8a7a5a;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s}
.tab.active{color:#c8a84e;border-bottom-color:#c8a84e}

/* MAIN */
.main{padding:16px;max-width:500px;margin:0 auto}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-input{flex:1;padding:10px 14px;border:1px solid #e8d8c0;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:13px;background:#fff;outline:none;color:#2a1f0a}
.search-input:focus{border-color:#c8a84e}
.add-btn{padding:10px 16px;background:linear-gradient(135deg,#c8a84e,#e8c87a);color:#2a1f0a;border:none;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;letter-spacing:1px;cursor:pointer;white-space:nowrap}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-pill{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1px solid #e8d8c0;background:transparent;font-family:"DM Sans",sans-serif;font-size:10px;color:#8a7a5a;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.filter-pill.active{background:linear-gradient(135deg,#c8a84e,#e8c87a);border-color:#c8a84e;color:#2a1f0a;font-weight:500}
.filter-pill.bride-pill{border-color:#f4b8cc;background:#fef0f4;color:#c8507a}
.filter-pill.groom-pill{border-color:#b8d0f4;background:#f0f4fe;color:#507ac8}

/* SECTION HEADERS */
.section-header{font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#8a7a5a;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid #f0e4cc;display:flex;align-items:center;gap:8px}
.section-header::before{content:"✿";color:#e8a878;font-size:12px}

/* GUEST CARDS */
.guest-card{background:#fff;border:1px solid #f0e4cc;border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s}
.guest-card.expanded{border-color:#c8a84e;box-shadow:0 2px 12px rgba(200,168,78,0.15)}
.guest-card-head{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:500;flex-shrink:0}
.avatar.bride{background:linear-gradient(135deg,#fce8f0,#fdf0e8);color:#c8507a}
.avatar.groom{background:linear-gradient(135deg,#e8f0fc,#e8f8fc);color:#507ac8}
.guest-info{flex:1;min-width:0}
.guest-name{font-size:13px;font-weight:500;color:#2a1f0a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsvp-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.rsvp-badge{font-size:9px;font-weight:500;padding:2px 7px;border-radius:8px;flex-shrink:0;letter-spacing:0.5px}
.rb-yes{background:#e8f5e0;color:#3a7a3a}
.rb-no{background:#fce8e8;color:#c85050}
.rb-nr{background:#fef8e0;color:#a87820}
.rb-na{background:#f0f0e8;color:#888870}
.guest-count{font-family:"Cormorant Garamond",serif;font-size:22px;color:#c8a84e;flex-shrink:0;line-height:1}
.chevron{font-size:10px;color:#d0c8b0;flex-shrink:0;transition:transform 0.2s}
.chevron.open{transform:rotate(180deg)}

/* EXPANDED */
.guest-expanded{padding:0 14px 14px;border-top:1px solid #faf4ea}
.rsvp-section{margin-top:10px}
.rsvp-section-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#8a7a5a;margin-bottom:8px}
.rsvp-options{display:flex;gap:5px}
.rsvp-opt{flex:1;padding:7px 4px;border-radius:8px;border:1px solid #e8d8c0;background:transparent;font-family:"DM Sans",sans-serif;font-size:10px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s;color:#8a7a5a}
.ro-yes{background:#3a7a3a;border-color:#3a7a3a;color:#fff}
.ro-no{background:#c85050;border-color:#c85050;color:#fff}
.ro-nr{background:#a87820;border-color:#a87820;color:#fff}
.ro-na{background:#888870;border-color:#888870;color:#fff}
.action-row{display:flex;gap:8px;margin-top:12px}
.edit-btn{flex:1;padding:9px;border-radius:8px;background:#fdf8f0;border:1px solid #e8d8c0;font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;color:#8a7a5a;cursor:pointer}
.delete-btn{padding:9px 14px;border-radius:8px;background:#fce8e8;border:1px solid #f0c8c8;font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;color:#c85050;cursor:pointer}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(42,31,10,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:#fffdf8;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:400;color:#2a1f0a;margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7a5a;margin-bottom:6px;display:block}
.modal-input{width:100%;padding:10px 14px;border:1px solid #e8d8c0;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:14px;color:#2a1f0a;background:#fff;outline:none}
.modal-input:focus{border-color:#c8a84e}
.modal-select{width:100%;padding:10px 14px;border:1px solid #e8d8c0;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:14px;color:#2a1f0a;background:#fff;outline:none}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-save{flex:1;padding:14px;background:linear-gradient(135deg,#c8a84e,#e8c87a);color:#2a1f0a;border:none;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.modal-cancel{padding:14px 20px;background:#f5ede0;border:1px solid #e8d8c0;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;color:#8a7a5a;cursor:pointer}

/* SUMMARY */
.summary-card{background:#fff;border:1px solid #f0e4cc;border-radius:14px;margin-bottom:12px;overflow:hidden}
.summary-card-title{padding:12px 16px;font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:500;background:linear-gradient(135deg,#fdf8f0,#fffdf8);border-bottom:1px solid #f0e4cc;color:#2a1f0a}
.summary-body{padding:12px 16px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #faf4ea}
.summary-row:last-child{border-bottom:none}
.summary-label{color:#8a7a5a;font-size:12px}
.summary-val{font-family:"Cormorant Garamond",serif;font-size:22px}

/* SAVE STATUS */
.save-status{padding:7px 20px;text-align:center;display:none}
.save-status.show{display:block}
.save-status.saving{background:#c8a84e}
.save-status.saved{background:#5a8a5c}
.save-status.error{background:#c85050}
.save-status span{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#fff}
</style>
</head>

let guests=[],expandedId=null,editingId=null,activeFilter='All',saveTimer=null;

function showStatus(msg,type){
  const el=document.getElementById('saveStatus'),tx=document.getElementById('saveText');
  el.className='save-status show '+type;
  tx.textContent=msg;
  if(type==='saved')setTimeout(()=>el.className='save-status',2500);
}

async function loadData(){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/wedding?select=data&limit=1',{headers:SB});
    const rows=await r.json();
    if(rows&&rows[0]&&rows[0].data){
      const parsed=typeof rows[0].data==='string'?JSON.parse(rows[0].data):rows[0].data;
      if(parsed&&parsed.guests&&parsed.guests.length>0){guests=parsed.guests;return;}
    }
  }catch(e){console.error(e)}
  guests=DEFAULT_GUESTS.map(g=>({...g}));
  scheduleSave();
}

function scheduleSave(){
  showStatus('Saving…','saving');
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      const r=await fetch(SUPABASE_URL+'/rest/v1/wedding?id=eq.1',{
        method:'PATCH',headers:{...SB,'Prefer':'return=minimal'},
        body:JSON.stringify({data:JSON.stringify({guests})})
      });
      if(r.ok||r.status===204)showStatus('✓ Saved','saved');
      else throw new Error(r.status);
    }catch(e){showStatus('⚠ Save failed','error');console.error(e);}
  },800);
}

function switchTab(tab){
  document.getElementById('guestsView').style.display=tab==='guests'?'':'none';
  document.getElementById('summaryView').style.display=tab==='summary'?'':'none';
  document.getElementById('tabGuests').className='tab'+(tab==='guests'?' active':'');
  document.getElementById('tabSummary').className='tab'+(tab==='summary'?' active':'');
  if(tab==='summary')renderSummary();
}

function rsvpClass(v){return v==='YES'?'yes':v==='NO'?'no':v==='N/A'?'na':'nr';}
function rsvpLabel(v){return v==='YES'?'Yes':v==='NO'?'No':v==='N/A'?'N/A':'Pending';}
function getInitial(n){return n.trim()[0].toUpperCase();}

function updateStats(){
  const evs=['welcome','ceremony','reception'];
  const rfs=['rsvp_welcome','rsvp_ceremony','rsvp_reception'];
  const iids=['invW','invC','invR'],aids=['attW','attC','attR'],pids=['penW','penC','penR'];
  evs.forEach((ev,i)=>{
    document.getElementById(iids[i]).textContent=guests.reduce((s,g)=>s+(g[ev]||0),0);
    document.getElementById(aids[i]).textContent=guests.filter(g=>g[rfs[i]]==='YES').reduce((s,g)=>s+(g[ev]||0),0);
    document.getElementById(pids[i]).textContent=guests.filter(g=>g[rfs[i]]==='NOT RECEIVED').reduce((s,g)=>s+(g[ev]||0),0);
  });
}

function renderFilters(){
  const filters=['All','Bride','Groom','Yes','No','Pending'];
  document.getElementById('filterRow').innerHTML=filters.map(f=>{
    let cls='filter-pill'+(activeFilter===f?' active':'');
    if(f==='Bride'&&activeFilter!=='Bride')cls+=' bride-pill';
    if(f==='Groom'&&activeFilter!=='Groom')cls+=' groom-pill';
    return `<button class="${cls}" onclick="setFilter('${f}')">${f}</button>`;
  }).join('');
}

function setFilter(f){activeFilter=f;renderFilters();renderGuests();}

function renderGuests(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  let filtered=guests.filter(g=>{
    if(search&&!g.name.toLowerCase().includes(search))return false;
    if(activeFilter==='Bride')return g.side==='Bride';
    if(activeFilter==='Groom')return g.side==='Groom';
    if(activeFilter==='Yes')return g.rsvp_reception==='YES';
    if(activeFilter==='No')return g.rsvp_reception==='NO';
    if(activeFilter==='Pending')return g.rsvp_reception==='NOT RECEIVED';
    return true;
  });
  const groups={};
  filtered.forEach(g=>{if(!groups[g.category])groups[g.category]=[];groups[g.category].push(g);});
  let html='';
  Object.entries(groups).sort().forEach(([cat,grp])=>{
    html+=`<div class="section-header">${cat} <span style="color:#c8a84e;font-size:10px">(${grp.length})</span></div>`;
    grp.forEach(g=>{
      const isExp=expandedId===g.id,side=g.side==='Bride'?'bride':'groom';
      html+=`<div class="guest-card${isExp?' expanded':''}">
        <div class="guest-card-head" onclick="toggleExpand(${g.id})">
          <div class="avatar ${side}">${getInitial(g.name)}</div>
          <div class="guest-info">
            <div class="guest-name">${g.name}</div>
            <div class="rsvp-row">
              <span class="rsvp-badge rb-${rsvpClass(g.rsvp_welcome)}">W: ${rsvpLabel(g.rsvp_welcome)}</span>
              <span class="rsvp-badge rb-${rsvpClass(g.rsvp_ceremony)}">C: ${rsvpLabel(g.rsvp_ceremony)}</span>
              <span class="rsvp-badge rb-${rsvpClass(g.rsvp_reception)}">R: ${rsvpLabel(g.rsvp_reception)}</span>
            </div>
          </div>
          <div class="guest-count">${g.reception||0}</div>
          <div class="chevron${isExp?' open':''}">▼</div>
        </div>
        ${isExp?`<div class="guest-expanded">
          ${['welcome','ceremony','reception'].map((ev,i)=>{
            const rf=['rsvp_welcome','rsvp_ceremony','rsvp_reception'][i];
            const lbl=['Welcome Party','Ceremony','Reception'][i];
            return `<div class="rsvp-section"style="${i>0?'margin-top:10px':''}">
              <div class="rsvp-section-title">${lbl} RSVP</div>
              <div class="rsvp-options">
                ${['YES','NO','NOT RECEIVED','N/A'].map(v=>
                  `<button class="rsvp-opt${g[rf]===v?' ro-'+rsvpClass(v):''}" onclick="updateRsvp(${g.id},'${rf}','${v}')">${rsvpLabel(v)}</button>`
                ).join('')}
              </div></div>`;
          }).join('')}
          <div class="action-row">
            <button class="edit-btn" onclick="openModal(${g.id})">✏️ Edit</button>
            <button class="delete-btn" onclick="deleteGuest(${g.id})">Remove</button>
          </div></div>`:''}
      </div>`;
    });
  });
  if(!html)html=`<div style="text-align:center;padding:40px;color:#8a7a5a;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic">No guests found</div>`;
  document.getElementById('guestList').innerHTML=html;
  updateStats();
}

function toggleExpand(id){const sy=window.scrollY;expandedId=expandedId===id?null:id;renderGuests();window.scrollTo(0,sy);}
function updateRsvp(id,field,val){const sy=window.scrollY;const g=guests.find(g=>g.id===id);if(g){g[field]=val;scheduleSave();}renderGuests();window.scrollTo(0,sy);}
function deleteGuest(id){if(!confirm('Remove this guest?'))return;guests=guests.filter(g=>g.id!==id);expandedId=null;scheduleSave();renderGuests();}

function openModal(id){
  editingId=id||null;
  document.getElementById('modalBg').classList.remove('hidden');
  if(id){
    const g=guests.find(g=>g.id===id);
    document.getElementById('modalTitle').textContent='Edit Guest';
    document.getElementById('mName').value=g.name;
    document.getElementById('mSide').value=g.side;
    document.getElementById('mCount').value=g.reception||1;
    document.getElementById('mCategory').value=g.category;
    document.getElementById('mWelcome').checked=g.welcome>0;
    document.getElementById('mCeremony').checked=g.ceremony>0;
    document.getElementById('mReception').checked=g.reception>0;
    document.getElementById('mRsvpW').value=g.rsvp_welcome;
    document.getElementById('mRsvpC').value=g.rsvp_ceremony;
    document.getElementById('mRsvpR').value=g.rsvp_reception;
  }else{
    document.getElementById('modalTitle').textContent='Add Guest';
    document.getElementById('mName').value='';
    document.getElementById('mSide').value='Bride';
    document.getElementById('mCount').value=1;
    document.getElementById('mWelcome').checked=true;
    document.getElementById('mCeremony').checked=true;
    document.getElementById('mReception').checked=true;
    document.getElementById('mRsvpW').value='NOT RECEIVED';
    document.getElementById('mRsvpC').value='NOT RECEIVED';
    document.getElementById('mRsvpR').value='NOT RECEIVED';
  }
}

function closeModal(){document.getElementById('modalBg').classList.add('hidden');editingId=null;}

function saveGuest(){
  const name=document.getElementById('mName').value.trim();
  if(!name){alert('Please enter a name');return;}
  const count=parseInt(document.getElementById('mCount').value)||1;
  const data={name,side:document.getElementById('mSide').value,category:document.getElementById('mCategory').value,
    welcome:document.getElementById('mWelcome').checked?count:0,
    ceremony:document.getElementById('mCeremony').checked?count:0,
    reception:document.getElementById('mReception').checked?count:0,
    rsvp_welcome:document.getElementById('mRsvpW').value,
    rsvp_ceremony:document.getElementById('mRsvpC').value,
    rsvp_reception:document.getElementById('mRsvpR').value,
    priority:'Invite',std:true,invite:true};
  if(editingId){guests[guests.findIndex(g=>g.id===editingId)]={...guests[guests.findIndex(g=>g.id===editingId)],...data};}
  else{data.id=Date.now();guests.push(data);}
  closeModal();scheduleSave();renderGuests();
}

function renderSummary(){
  const evs=['welcome','ceremony','reception'],labs=['Welcome Party','Ceremony','Reception'],rfs=['rsvp_welcome','rsvp_ceremony','rsvp_reception'];
  let html='';
  html+=`<div class="summary-card"><div class="summary-card-title">Overall</div><div class="summary-body">`;
  evs.forEach((ev,i)=>{
    const inv=guests.reduce((s,g)=>s+(g[ev]||0),0);
    const yes=guests.filter(g=>g[rfs[i]]==='YES').reduce((s,g)=>s+(g[ev]||0),0);
    const no=guests.filter(g=>g[rfs[i]]==='NO').reduce((s,g)=>s+(g[ev]||0),0);
    const pen=guests.filter(g=>g[rfs[i]]==='NOT RECEIVED').reduce((s,g)=>s+(g[ev]||0),0);
    html+=`<div class="summary-row"><span class="summary-label">${labs[i]} — Invited</span><span class="summary-val" style="color:#5a8a5c">${inv}</span></div>`;
    html+=`<div class="summary-row"><span class="summary-label">${labs[i]} — Attending</span><span class="summary-val" style="color:#3a7a3a">${yes}</span></div>`;
    html+=`<div class="summary-row"><span class="summary-label">${labs[i]} — Declined</span><span class="summary-val" style="color:#c85050">${no}</span></div>`;
    html+=`<div class="summary-row"><span class="summary-label">${labs[i]} — Pending</span><span class="summary-val" style="color:#a87820">${pen}</span></div>`;
  });
  html+='</div></div>';
  ['Bride','Groom'].forEach(side=>{
    const sg=guests.filter(g=>g.side===side);
    html+=`<div class="summary-card"><div class="summary-card-title">${side}'s Side</div><div class="summary-body">`;
    evs.forEach((ev,i)=>{
      const inv=sg.reduce((s,g)=>s+(g[ev]||0),0);
      const yes=sg.filter(g=>g[rfs[i]]==='YES').reduce((s,g)=>s+(g[ev]||0),0);
      html+=`<div class="summary-row"><span class="summary-label">${labs[i]}</span><span class="summary-val" style="color:#5a8a5c">${yes} / ${inv}</span></div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('summaryContent').innerHTML=html;
}

async function init(){
  // Countdowns
  const now = new Date();
  const today = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  const rsvp = Date.UTC(2026, 5, 1);
  const wedding = Date.UTC(2026, 5, 27);
  document.getElementById('rsvpDays').textContent = Math.max(0, Math.round((rsvp - today) / 86400000));
  document.getElementById('weddingDays').textContent = Math.max(0, Math.round((wedding - today) / 86400000));
  await loadData();renderFilters();renderGuests();
}
init();
</script>
