body{font-family:"DM Sans",sans-serif;background:#f7faf7;color:#1a2a1e;min-height:100vh}

.stats-row-label{padding:10px 10px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:#6b7d6b;display:flex;align-items:center}
.stats-cell{padding:10px 4px;text-align:center}

.tabs{display:flex;background:#edf5ee;border-bottom:1px solid #c8ddc8}

.rsvp-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.rsvp-badge{font-size:9px;font-weight:500;padding:2px 6px;border-radius:6px;flex-shrink:0}

.rsvp-badge.no{background:#fce8e8;color:#c85050}
.rsvp-badge.nr{background:#fef8e8;color:#a87e2a}

.guest-count{font-family:"Cormorant Garamond",serif;font-size:20px;color:#e8c46e;flex-shrink:0}
.chevron{font-size:10px;color:#c0c8c0;flex-shrink:0;transition:transform 0.2s}

.guest-expanded{padding:0 14px 14px;border-top:1px solid #f0f5f0}
.rsvp-section{margin-top:10px}
.rsvp-section-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#6b7d6b;margin-bottom:8px}
.rsvp-options{display:flex;gap:5px}
.rsvp-opt{flex:1;padding:7px 4px;border-radius:8px;border:1px solid #e0ece0;background:transparent;font-family:"DM Sans",sans-serif;font-size:10px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s;color:#6b7d6b}
.rsvp-opt.sel-yes{background:#3a6e3a;border-color:#3a6e3a;color:#fff}
.rsvp-opt.sel-no{background:#c85050;border-color:#c85050;color:#fff}
.rsvp-opt.sel-nr{background:#a87e2a;border-color:#a87e2a;color:#fff}
.rsvp-opt.sel-na{background:#888;border-color:#888;color:#fff}
.action-row{display:flex;gap:8px;margin-top:12px}
.edit-btn{flex:1;padding:9px;border-radius:8px;background:#edf5ee;border:1px solid #c8ddc8;font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;color:#3a6e3a;cursor:pointer}

.modal-bg{position:fixed;inset:0;background:rgba(26,42,30,0.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:400;color:#1a2a1e;margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#6b7d6b;margin-bottom:6px;display:block}
.modal-input{width:100%;padding:10px 14px;border:1px solid #c8ddc8;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:14px;color:#1a2a1e;background:#fff;outline:none}
.modal-input:focus{border-color:#8ab58e}
.modal-select{width:100%;padding:10px 14px;border:1px solid #c8ddc8;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:14px;color:#1a2a1e;background:#fff;outline:none}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-save{flex:1;padding:14px;background:#6a9e6e;color:#fff;border:none;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer}

let guests=[],expandedId=null,editingId=null,activeFilter='All',saveTimer=null;

function showStatus(msg,type){
  const el=document.getElementById('saveStatus'),tx=document.getElementById('saveText');
  el.className='save-status show '+type;
  tx.textContent=msg;
  if(type==='saved')setTimeout(()=>el.className='save-status',2000);
}

async function loadData(){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/wedding?select=data&limit=1',{headers:SB});
    const rows=await r.json();
    if(rows&&rows[0]&&rows[0].data){
      const parsed=typeof rows[0].data==='string'?JSON.parse(rows[0].data):rows[0].data;
      if(parsed&&parsed.guests&&parsed.guests.length>0){guests=parsed.guests;return;}
    }
  }catch(e){console.error(e)}
  guests=DEFAULT_GUESTS.map(g=>({...g}));
  scheduleSave();
}

function scheduleSave(){
  showStatus('Saving…','saving');
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      const r=await fetch(SUPABASE_URL+'/rest/v1/wedding?id=eq.1',{
        method:'PATCH',
        headers:{...SB,'Prefer':'return=minimal'},
        body:JSON.stringify({data:JSON.stringify({guests})})
      });
      if(r.ok||r.status===204)showStatus('✓ Saved','saved');
      else throw new Error(r.status);
    }catch(e){showStatus('⚠ Save failed','error');console.error(e);}
  },800);
}

function switchTab(tab){
  document.getElementById('guestsView').style.display=tab==='guests'?'':'none';
  document.getElementById('summaryView').style.display=tab==='summary'?'':'none';
  document.getElementById('tabGuests').className='tab'+(tab==='guests'?' active':'');
  document.getElementById('tabSummary').className='tab'+(tab==='summary'?' active':'');
  if(tab==='summary')renderSummary();
}

function rsvpClass(v){return v==='YES'?'yes':v==='NO'?'no':v==='N/A'?'na':'nr';}
function rsvpLabel(v){return v==='YES'?'Yes':v==='NO'?'No':v==='N/A'?'N/A':'Pending';}
function getInitial(name){return name.trim()[0].toUpperCase();}

function updateStats(){
  const ev=['welcome','ceremony','reception'];
  const rf=['rsvp_welcome','rsvp_ceremony','rsvp_reception'];
  const ids=[['invW','invC','invR'],['attW','attC','attR'],['penW','penC','penR']];
  ev.forEach((e,i)=>{
    const inv=guests.reduce((s,g)=>s+(g[e]||0),0);
    const att=guests.filter(g=>g[rf[i]]==='YES').reduce((s,g)=>s+(g[e]||0),0);
    const pen=guests.filter(g=>g[rf[i]]==='NOT RECEIVED').reduce((s,g)=>s+(g[e]||0),0);
    document.getElementById(ids[0][i]).textContent=inv;
    document.getElementById(ids[1][i]).textContent=att;
    document.getElementById(ids[2][i]).textContent=pen;
  });
}

function renderFilters(){
  const filters=['All','Bride','Groom','Yes','No','Pending'];
  document.getElementById('filterRow').innerHTML=filters.map(f=>{
    let cls='filter-pill'+(activeFilter===f?' active':'');
    if(f==='Bride'&&activeFilter!=='Bride')cls+=' bride';
    if(f==='Groom'&&activeFilter!=='Groom')cls+=' groom';
    return `<button class="${cls}" onclick="setFilter('${f}')">${f}</button>`;
  }).join('');
}

function setFilter(f){activeFilter=f;renderFilters();renderGuests();}

function renderGuests(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  let filtered=guests.filter(g=>{
    if(search&&!g.name.toLowerCase().includes(search))return false;
    if(activeFilter==='Bride')return g.side==='Bride';
    if(activeFilter==='Groom')return g.side==='Groom';
    if(activeFilter==='Yes')return g.rsvp_reception==='YES';
    if(activeFilter==='No')return g.rsvp_reception==='NO';
    if(activeFilter==='Pending')return g.rsvp_reception==='NOT RECEIVED';
    return true;
  });

  const groups={};
  filtered.forEach(g=>{if(!groups[g.category])groups[g.category]=[];groups[g.category].push(g);});

  let html='';
  Object.entries(groups).sort().forEach(([cat,grp])=>{
    html+=`<div class="section-header">${cat} <span style="color:#e8c46e">(${grp.length})</span></div>`;
    grp.forEach(g=>{
      const isExp=expandedId===g.id;
      const side=g.side==='Bride'?'bride':'groom';
      html+=`<div class="guest-card${isExp?' expanded':''}">
        <div class="guest-card-head" onclick="toggleExpand(${g.id})">
          <div class="avatar ${side}">${getInitial(g.name)}</div>
          <div class="guest-info">
            <div class="guest-name">${g.name}</div>
            <div class="rsvp-row">
              <span class="rsvp-badge ${rsvpClass(g.rsvp_welcome)}">W: ${rsvpLabel(g.rsvp_welcome)}</span>
              <span class="rsvp-badge ${rsvpClass(g.rsvp_ceremony)}">C: ${rsvpLabel(g.rsvp_ceremony)}</span>
              <span class="rsvp-badge ${rsvpClass(g.rsvp_reception)}">R: ${rsvpLabel(g.rsvp_reception)}</span>
            </div>
          </div>
          <div class="guest-count">${g.reception||0}</div>
          <div class="chevron${isExp?' open':''}">▼</div>
        </div>
        ${isExp?`<div class="guest-expanded">
          ${['welcome','ceremony','reception'].map((ev,i)=>{
            const rf=['rsvp_welcome','rsvp_ceremony','rsvp_reception'][i];
            const lbl=['Welcome Party','Ceremony','Reception'][i];
            return `<div class="rsvp-section${i>0?' style=\"margin-top:10px\"':''}">
              <div class="rsvp-section-title">${lbl} RSVP</div>
              <div class="rsvp-options">
                ${['YES','NO','NOT RECEIVED','N/A'].map(v=>
                  `<button class="rsvp-opt${g[rf]===v?' sel-'+rsvpClass(v):''}" onclick="updateRsvp(${g.id},'${rf}','${v}')">${rsvpLabel(v)}</button>`
                ).join('')}
              </div>
            </div>`;
          }).join('')}
          <div class="action-row">
            <button class="edit-btn" onclick="openModal(${g.id})">✏️ Edit</button>
            <button class="delete-btn" onclick="deleteGuest(${g.id})">Remove</button>
          </div>
        </div>`:''}
      </div>`;
    });
  });

  if(!html)html=`<div style="text-align:center;padding:40px;color:#6b7d6b;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic">No guests found</div>`;
  document.getElementById('guestList').innerHTML=html;
  updateStats();
}

function toggleExpand(id){
  const sy=window.scrollY;
  expandedId=expandedId===id?null:id;
  renderGuests();
  window.scrollTo(0,sy);
}

function updateRsvp(id,field,val){
  const sy=window.scrollY;
  const g=guests.find(g=>g.id===id);
  if(g){g[field]=val;scheduleSave();}
  renderGuests();
  window.scrollTo(0,sy);
}

function deleteGuest(id){
  if(!confirm('Remove this guest?'))return;
  guests=guests.filter(g=>g.id!==id);
  expandedId=null;
  scheduleSave();
  renderGuests();
}

function openModal(id){
  editingId=id||null;
  document.getElementById('modalBg').classList.remove('hidden');
  if(id){
    const g=guests.find(g=>g.id===id);
    document.getElementById('modalTitle').textContent='Edit Guest';
    document.getElementById('mName').value=g.name;
    document.getElementById('mSide').value=g.side;
    document.getElementById('mCount').value=g.reception||1;
    document.getElementById('mCategory').value=g.category;
    document.getElementById('mWelcome').checked=g.welcome>0;
    document.getElementById('mCeremony').checked=g.ceremony>0;
    document.getElementById('mReception').checked=g.reception>0;
    document.getElementById('mRsvpW').value=g.rsvp_welcome;
    document.getElementById('mRsvpC').value=g.rsvp_ceremony;
    document.getElementById('mRsvpR').value=g.rsvp_reception;
  }else{
    document.getElementById('modalTitle').textContent='Add Guest';
    document.getElementById('mName').value='';
    document.getElementById('mSide').value='Bride';
    document.getElementById('mCount').value=1;
    document.getElementById('mWelcome').checked=true;
    document.getElementById('mCeremony').checked=true;
    document.getElementById('mReception').checked=true;
    document.getElementById('mRsvpW').value='NOT RECEIVED';
    document.getElementById('mRsvpC').value='NOT RECEIVED';
    document.getElementById('mRsvpR').value='NOT RECEIVED';
  }
}

function closeModal(){document.getElementById('modalBg').classList.add('hidden');editingId=null;}

function saveGuest(){
  const name=document.getElementById('mName').value.trim();
  if(!name){alert('Please enter a name');return;}
  const count=parseInt(document.getElementById('mCount').value)||1;
  const data={
    name,side:document.getElementById('mSide').value,
    category:document.getElementById('mCategory').value,
    welcome:document.getElementById('mWelcome').checked?count:0,
    ceremony:document.getElementById('mCeremony').checked?count:0,
    reception:document.getElementById('mReception').checked?count:0,
    rsvp_welcome:document.getElementById('mRsvpW').value,
    rsvp_ceremony:document.getElementById('mRsvpC').value,
    rsvp_reception:document.getElementById('mRsvpR').value,
    priority:'Invite',std:true,invite:true
  };
  if(editingId){
    const idx=guests.findIndex(g=>g.id===editingId);
    guests[idx]={...guests[idx],...data};
  }else{
    data.id=Date.now();
    guests.push(data);
  }
  closeModal();scheduleSave();renderGuests();
}

function renderSummary(){
  const evs=['welcome','ceremony','reception'];
  const labs=['Welcome Party','Ceremony','Reception'];
  const rfs=['rsvp_welcome','rsvp_ceremony','rsvp_reception'];
  let html='';
  html+=`<div class="summary-card"><div class="summary-card-title">Overall</div><div class="summary-body">`;
  evs.forEach((ev,i)=>{
    const inv=guests.reduce((s,g)=>s+(g[ev]||0),0);
    const yes=guests.filter(g=>g[rfs[i]]==='YES').reduce((s,g)=>s+(g[ev]||0),0);
    const no=guests.filter(g=>g[rfs[i]]==='NO').reduce((s,g)=>s+(g[ev]||0),0);
    const pen=guests.filter(g=>g[rfs[i]]==='NOT RECEIVED').reduce((s,g)=>s+(g[ev]||0),0);
    html+=`<div class="summary-row"><span class="summary-label">${labs[i]} — Invited</span><span class="summary-val" style="color:#5a7a5c">${inv}</span></div>`;
    html+=`<div class="summary-row"><span class="summary-label">${labs[i]} — Attending</span><span class="summary-val" style="color:#3a6e3a">${yes}</span></div>`;
    html+=`<div class="summary-row"><span class="summary-label">${labs[i]} — Declined</span><span class="summary-val" style="color:#c85050">${no}</span></div>`;
    html+=`<div class="summary-row"><span class="summary-label">${labs[i]} — Pending</span><span class="summary-val" style="color:#a87e2a">${pen}</span></div>`;
  });
  html+='</div></div>';
  ['Bride','Groom'].forEach(side=>{
    const sg=guests.filter(g=>g.side===side);
    html+=`<div class="summary-card"><div class="summary-card-title">${side}'s Side</div><div class="summary-body">`;
    evs.forEach((ev,i)=>{
      const inv=sg.reduce((s,g)=>s+(g[ev]||0),0);
      const yes=sg.filter(g=>g[rfs[i]]==='YES').reduce((s,g)=>s+(g[ev]||0),0);
      html+=`<div class="summary-row"><span class="summary-label">${labs[i]}</span><span class="summary-val" style="color:#5a7a5c">${yes} / ${inv}</span></div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('summaryContent').innerHTML=html;
}

async function init(){
  await loadData();
  renderFilters();
  renderGuests();
}
init();
</script>
</body>
</html>
